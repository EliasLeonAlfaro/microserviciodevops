name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Ejecutar deploy en EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 3.235.159.45
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd microserviciodevops || git clone https://github.com/EliasLeonAlfaro/microserviciodevops.git
            cd microserviciodevops
            git pull origin main
            sudo docker stop microservicio || true
            sudo docker rm microservicio || true
            sudo docker build -t microservicio .
            sudo docker run -d -p 3000:3000 --name microservicio microservicio
